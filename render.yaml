services:
  - type: web
    name: rag-assistant
    env: docker
    dockerfilePath: project/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-5-nano
      - key: DATA_DIR
        value: /data
      - key: GRADIO_SHARE
        value: "false"
      - key: CARGO_HOME
        value: /tmp/.cargo
      - key: RUSTUP_HOME
        value: /tmp/.rustup
    secrets:
      - OPENAI_API_KEY
